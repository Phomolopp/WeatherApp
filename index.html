<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Weather App</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Animated background and weather effects -->
  <div class="weather-bg" id="weather-bg"></div>
  <canvas id="weather-canvas"></canvas>

  <div id="app">
    <div class="top-bar glass">
      <input type="text" placeholder="Search city..." id="search-input">
      <button id="search-btn">🔍</button>
    </div>

    <div class="current-weather glass">
      <h1 id="city-name">City</h1>
      <div class="weather-main">
        <img id="weather-icon" src="" alt="weather icon">
        <span id="temperature">25°C</span>
      </div>
      <p id="weather-description">Clear Sky</p>
    </div>

    <div class="forecast" id="forecast-container">
      <!-- Forecast cards will be added here -->
    </div>
  </div>

<script src="app.js"></script>
</body>
</html>
